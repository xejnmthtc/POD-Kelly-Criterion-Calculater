<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kelly</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1a2e;
      --card:#121f36;
      --stroke:rgba(255,255,255,.10);
      --text:#e8eefc;
      --muted:rgba(232,238,252,.70);
      --muted2:rgba(232,238,252,.55);
      --accent:#3b82f6;
      --good:#22c55e;
      --shadow:0 18px 50px rgba(0,0,0,.45);
      --radius:14px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:12px;
      width:320px;
      background:linear-gradient(180deg, var(--bg), #070c16);
      color:var(--text);
      font: 13px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }
    .title{
      font-weight:700;
      letter-spacing:.2px;
      font-size:14px;
    }
    .pill{
      font-size:12px;
      padding:4px 8px;
      border:1px solid var(--stroke);
      border-radius:999px;
      color:var(--muted);
      background:rgba(255,255,255,.04);
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      gap:8px;
    }
    .stat{
      flex:1;
      background:rgba(0,0,0,.20);
      border:1px solid var(--stroke);
      border-radius:12px;
      padding:10px;
    }
    .label{
      color:var(--muted2);
      font-size:11px;
      margin-bottom:4px;
    }
    .value{
      font-weight:400;
      font-size:13px;
      white-space:pre-line;
    }

    .field{
      margin-top:10px;
    }
    label{
      display:block;
      color:var(--muted);
      font-size:11px;
      margin:0 0 6px;
    }
    input{
      width:100%;
      padding:10px 10px;
      border-radius:12px;
      border:1px solid var(--stroke);
      background:rgba(0,0,0,.22);
      color:var(--text);
      outline:none;
    }
    input:focus{
      border-color:rgba(59,130,246,.65);
      box-shadow:0 0 0 3px rgba(59,130,246,.18);
    }

    .btn{
      margin-top:12px;
      width:100%;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid rgba(59,130,246,.55);
      background:linear-gradient(180deg, rgba(59,130,246,.95), rgba(37,99,235,.95));
      color:white;
      font-weight:700;
      cursor:pointer;
      transition:transform .04s ease;
    }
    .btn:active{ transform:translateY(1px); }

    .result{
      margin-top:10px;
      border:1px solid var(--stroke);
      border-radius:12px;
      background:rgba(0,0,0,.22);
      padding:10px;
      white-space:pre-line;
      color:var(--text);
    }
    .hint{
      margin-top:8px;
      color:var(--muted2);
      font-size:11px;
    }
    .good{
      color:var(--good);
      font-weight:700;
    }
    #resultBox b{
  font-weight: 800;
  color: #fff;
}

    .footer{
  margin-top:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.by{
  color:var(--muted2);
  font-size:11px;
}
.byName{
  color:var(--text);
  font-weight:700;
}
.linkBtn{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.06);
  color:var(--text);
  cursor:pointer;
}
.linkBtn:hover{
  background:rgba(255,255,255,.10);
}

.bmc{
  margin-top:8px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:7px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:#FFDD00;
  color:#111827;
  font-weight:600;      /* ✅ not bold */
  font-size:12px;       /* ✅ smaller text */
  text-decoration:none;
  box-shadow: 0 8px 18px rgba(0,0,0,.22);
}
.bmc:hover{ filter:brightness(0.98); }
.bmc:active{ transform:translateY(1px); }
.bmcIcon{
  display:inline-flex;
  width:16px;           /* ✅ smaller icon */
  height:16px;
  align-items:center;
  justify-content:center;
}
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Kelly Calculator</div>
    <div class="pill">POD</div>
  </div>

  <div class="card">
    <div class="row">
      <div class="stat" style="flex:1">
        <div class="label">Clicked Odds</div>
        <div class="value" id="clickedBox">Clicked Odds (red): -</div>
      </div>
    </div>

    <div class="field">
      <label for="offeredOdds">Offered Odds</label>
      <input id="offeredOdds" type="number" step="0.001" min="1" placeholder="e.g. 1.90" />
    </div>

    <div class="field">
      <label for="bankroll">Bankroll</label>
      <input id="bankroll" type="number" step="1" min="0" />
    </div>

    <div class="field">
      <label for="kellyFactor">Fractional Kelly (0.10 = 10%)</label>
      <input id="kellyFactor" type="number" step="0.01" min="0" max="1" />
    </div>

    <button class="btn" id="calc">Calculate</button>

    <div class="result" id="resultBox">Result: -</div>
    <button class="btn" id="copyStake" style="margin-top:10px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);">
  Copy Stake (fractional)
</button>
    <div class="hint">Tip: click a red odds value in the table, or click a Price value in the movement table, then open this popup.</div>
    <a class="bmc" href="https://buymeacoffee.com/xejnmthtc" target="_blank" rel="noopener noreferrer">
  <span class="bmcIcon" aria-hidden="true">
    <!-- coffee cup icon (SVG) -->
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
      <path d="M6 8h10v6a5 5 0 0 1-5 5H9a3 3 0 0 1-3-3V8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M16 9h2a2 2 0 0 1 0 4h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 3c0 1 1 1 1 2s-1 1-1 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M12 3c0 1 1 1 1 2s-1 1-1 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </span>
  <span>Buy me a coffee</span>
</a>
    <div class="footer">
  <div class="by">Built by <span class="byName">xejnmthtc</span></div>
</div>
  </div>

  <!-- Keep these (your JS expects these IDs to exist; we hide them to avoid changing logic) -->
  <div style="display:none">
    <div id="trueBox"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
